services:
  db:
    image: postgres:17-alpine
    container_name: kdkdkdkd-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sharq
      POSTGRES_PASSWORD: sharq
      POSTGRES_DB: sharq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharq -d sharq"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: kdkdkdkd-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 5s
      timeout: 5s
      retries: 15
    depends_on:
      db:
        condition: service_healthy

  sync_history:
    build:
      context: ./camera_scheduler
    container_name: kdkdkdkd-sync-history
    command: ["python", "sync_history.py"]
    env_file: ./camera_scheduler/.env
    depends_on:
      backend:
        condition: service_healthy

  camera_scheduler:
    build:
      context: ./camera_scheduler
    container_name: kdkdkdkd-scheduler
    restart: unless-stopped
    depends_on:
      sync_history:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    container_name: kdkdkdkd-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
