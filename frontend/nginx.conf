server {
    listen       ${PORT};
    listen       [::]:${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — все маршруты отдают index.html, React-router разруливает на клиенте.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Долгий кеш для статики (имена файлов содержат хеш — безопасно).
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html не кешировать — иначе после деплоя клиенты застрянут на старой версии.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
